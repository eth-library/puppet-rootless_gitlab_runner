---
# Fixture hierarchy with an in-repository encrypted-secrets level whose file
# carries a stray key.
version: 5

defaults:
  datadir: data
  data_hash: yaml_data

hierarchy:
  - name: 'Encrypted secrets (per-node)'
    lookup_key: eyaml_lookup_key
    path: 'secrets/%{facts.networking.hostname}.eyaml'
