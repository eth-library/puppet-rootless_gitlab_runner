---
# Consumer layer with a plain (unwrapped) token store: the module's
# convert_to lookup rule must wrap it Sensitive on lookup, or the typed
# runner_tokens parameter rejects the bare hash.
rootless_gitlab_runner::runner_tokens:
  runner_a: 'glrt-PLAIN-STORE-TOKEN'
rootless_gitlab_runner::runners:
  - name: 'plain-store-runner'
    url: 'https://gitlab.example.org/'
    executor: 'docker'
    image: 'ubuntu:22.04'
    token_key: 'runner_a'
