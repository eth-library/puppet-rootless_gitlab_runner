---
# Off-repository secret store: copy to /etc/gitlab-runner-infra/secrets.yaml on
# the host, root-owned mode 0600. It is the hierarchy's off-repository layer —
# never commit it. Encrypt it at rest: point a hiera-eyaml backend at this
# layer (an ordinary Hiera backend, read by `puppet apply` too).
#
# Runner tokens live under rootless_gitlab_runner::runner_tokens, keyed by each
# runner's token_key; further secrets the store grows can join as sibling keys.
rootless_gitlab_runner::runner_tokens:
  runner_a: 'glrt-REPLACE-WITH-RUNNER-TOKEN'
