---
# Module data layer: every parameter default (the class signature carries
# only the types) and the module's lookup_options — the deep-merge rules for
# the struct parameters, and the convert_to that wraps the runner-token store
# in Sensitive on lookup, so a plain-YAML or hiera-eyaml secret store needs
# no special handling from the consumer. See data/common.yaml.
version: 5

defaults:
  datadir: data
  data_hash: yaml_data

hierarchy:
  - name: 'Module data'
    path: 'common.yaml'
