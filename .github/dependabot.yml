---
# Keep the SHA-pinned GitHub Actions, the Ruby gems, and the Nix flake inputs
# current. Dependabot opens a separate PR per ecosystem, weekly; within each
# ecosystem the updates are grouped into one PR. Each PR is gated by the same
# CI as any other change.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns: ["*"]
  - package-ecosystem: "bundler"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      gems:
        patterns: ["*"]
  - package-ecosystem: "nix"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      nix:
        patterns: ["*"]
